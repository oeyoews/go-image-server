<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Upload - Go Image Server</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 text-gray-800">
  <div id="app"></div>

  <script>
    const { createApp } = Vue;

    const i18n = {
      en: {
        uploadTitle: 'Image Upload',
        dropHint: 'Click, drag or Ctrl+V to paste image here',
        size: 'Size',
        fileName: 'File name',
        fileNamePlaceholder: 'Filename (optional extension)',
        pasteHint: 'This area supports Ctrl+V to paste images',
        imageList: 'Image list',
        hideList: 'Hide list',
        upload: 'Upload',
        uploading: 'Uploading...',
        link: 'Link',
        copy: 'Copy',
        copied: 'Copied',
        refresh: 'Refresh',
        loading: 'Loading...',
        storage: 'Storage',
        config: 'Config',
        copyStoragePath: 'Copy storage path',
        copyConfigPath: 'Copy config path',
        linkSource: 'Link source',
        linkSourceProxy: 'Proxy URL',
        linkSourceDirect: 'Direct URL',
        linkSourceAuto: 'Auto (prefer direct)',
        storageSettings: 'Storage settings',
        storageType: 'Type',
        localBaseDir: 'Local base dir',
        githubOwner: 'GitHub owner',
        githubRepo: 'GitHub repo',
        githubBranch: 'GitHub branch',
        githubPathPrefix: 'GitHub path prefix',
        githubTokenEnv: 'GitHub token env',
        githubToken: 'GitHub token',
        gitlabBaseUrl: 'GitLab base URL',
        gitlabProject: 'GitLab project',
        gitlabBranch: 'GitLab branch',
        gitlabPathPrefix: 'GitLab path prefix',
        gitlabTokenEnv: 'GitLab token env',
        gitlabToken: 'GitLab token',
        save: 'Save',
        saving: 'Saving...',
        saved: 'Saved',
        saveFail: 'Save failed',
        noImages: 'No images',
        noImagesHint: 'Drag image in the upload area above or use Ctrl+V to paste',
        open: 'Open',
        copyLink: 'Copy link',
        delete: 'Delete',
        showImageList: 'Show image list',
        hideImageList: 'Hide image list',
        preview: 'Preview',
        savePreviewSettings: 'Save preview settings',
        deleteConfirm: 'Delete this image?',
        deleteFail: 'Delete failed',
        loadFail: 'Load failed',
      },
      zh: {
        uploadTitle: '图片上传',
        dropHint: '点击、拖拽或 Ctrl+V 粘贴图片到此处',
        size: '大小',
        fileName: '文件名称',
        fileNamePlaceholder: '文件名（可含扩展名）',
        pasteHint: '本区域支持 Ctrl+V 粘贴图片',
        imageList: '图片列表',
        hideList: '隐藏列表',
        upload: '上传',
        uploading: '上传中...',
        link: '链接',
        copy: '复制',
        copied: '已复制',
        refresh: '刷新',
        loading: '加载中...',
        storage: '存储',
        config: '配置',
        copyStoragePath: '复制存储路径',
        copyConfigPath: '复制配置路径',
        linkSource: '链接来源',
        linkSourceProxy: '代理地址',
        linkSourceDirect: '直链地址',
        linkSourceAuto: '自动(优先直链)',
        storageSettings: '存储设置',
        storageType: '类型',
        localBaseDir: '本地存储目录',
        githubOwner: 'GitHub 用户/组织',
        githubRepo: 'GitHub 仓库',
        githubBranch: 'GitHub 分支',
        githubPathPrefix: 'GitHub 路径前缀',
        githubTokenEnv: 'GitHub Token 环境变量',
        githubToken: 'GitHub Token',
        gitlabBaseUrl: 'GitLab Base URL',
        gitlabProject: 'GitLab 项目',
        gitlabBranch: 'GitLab 分支',
        gitlabPathPrefix: 'GitLab 路径前缀',
        gitlabTokenEnv: 'GitLab Token 环境变量',
        gitlabToken: 'GitLab Token',
        save: '保存',
        saving: '保存中...',
        saved: '已保存',
        saveFail: '保存失败',
        noImages: '暂无图片',
        noImagesHint: '可在上方上传区拖拽图片，或使用 Ctrl+V 粘贴上传',
        open: '打开',
        copyLink: '复制链接',
        delete: '删除',
        showImageList: '显示图片列表',
        hideImageList: '隐藏图片列表',
        preview: '预览',
        savePreviewSettings: '保存预览设置',
        deleteConfirm: '确定删除这张图片吗？',
        deleteFail: '删除失败',
        loadFail: '加载失败',
      },
    };

    function unwrapApiResponse(data) {
      return { payload: data?.data, errorMessage: data?.message };
    }

    function getApiBase() {
      const origin = window.location.origin || '';
      return origin ? origin + '/api/v1' : '/api/v1';
    }

    createApp({
      data() {
        return {
          lang: localStorage.getItem('upload-lang') || 'en',
          file: null,
          previewUrl: '',
          selectedFileName: '',
          uploadFileName: '',
          isDragover: false,
          uploading: false,
          resultUrl: '',
          resultPayload: null,
          resultMessage: '',
          resultError: false,
          resultCopied: '',
          selectedFormat: localStorage.getItem('upload-format') || 'md',
          apiBase: getApiBase(),
          storageConfig: {
            type: 'local',
            local: { base_dir: '' },
            github: { owner: '', repo: '', branch: 'main', path_prefix: '', token_env: 'GITHUB_TOKEN', token: '' },
            gitlab: { base_url: 'https://gitlab.com', project: '', branch: 'main', path_prefix: '', token_env: 'GITLAB_TOKEN', token: '' },
          },
          storageSaving: false,
          storageSaved: false,
          storageSaveError: '',
          settingsSaving: false,
          settingsSaved: false,
          previewSaving: false,
          previewSaved: false,
          previewSaveError: '',
          imageGroups: [],
          imagesLoading: false,
          imagesError: '',
          dateFilter: new Date().toISOString().slice(0, 10),
          showImageList: false,
          previewImageList: false,
          storagePath: '',
          configPath: '',
          pathCopied: '',
        };
      },
      computed: {
        t() {
          return i18n[this.lang] || i18n.en;
        },
        markdownSnippet() {
          return this.resultUrl ? `![](${this.resultUrl})` : '';
        },
        wikitextSnippet() {
          return this.resultUrl ? `[img[image|${this.resultUrl}]]` : '';
        },
        vanillaSnippet() {
          return this.resultUrl || '';
        },
        displaySnippet() {
          if (!this.resultUrl) return '';
          if (this.selectedFormat === 'md') return this.markdownSnippet;
          if (this.selectedFormat === 'tw') return this.wikitextSnippet;
          return this.vanillaSnippet;
        },
      },
      mounted() {
        this.loadImages();
        this.loadServerInfo();
        this.loadStorageConfig();
        try { window?.lucide?.createIcons?.(); } catch (_) {}
      },
      updated() {
        // Re-render lucide icons after Vue updates DOM
        try { window?.lucide?.createIcons?.(); } catch (_) {}
      },
      beforeUnmount() {
        if (this.previewUrl) URL.revokeObjectURL(this.previewUrl);
      },
      methods: {
        iconSvg(name, cls = 'h-4 w-4') {
          const n = String(name || '').trim();
          if (!n) return '';
          return `<i data-lucide="${n}" class="${String(cls || '')}"></i>`;
        },
        resetPreview() {
          if (this.previewUrl) URL.revokeObjectURL(this.previewUrl);
          this.file = null;
          this.previewUrl = '';
          this.selectedFileName = '';
          this.uploadFileName = '';
        },
        getUploadFilename() {
          const raw = (this.uploadFileName || '').trim();
          const origName = this.file?.name || '';
          if (!origName) return origName;
          const origExt = origName.includes('.') ? origName.slice(origName.lastIndexOf('.')) : '';
          if (!raw) return origName;
          const base = raw.includes('.') ? raw.slice(0, raw.lastIndexOf('.')) : raw;
          return base ? base + origExt : origName;
        },
        onFileChange(e) {
          const file = e?.target?.files?.[0];
          if (!file) {
            this.resetPreview();
            return;
          }
          if (this.previewUrl) URL.revokeObjectURL(this.previewUrl);
          this.file = file;
          this.selectedFileName = file.name;
          this.uploadFileName = '';
          this.previewUrl = URL.createObjectURL(file);
        },
        onDragOver(e) {
          e.preventDefault();
          this.isDragover = true;
        },
        onDragLeave() {
          this.isDragover = false;
        },
        onDrop(e) {
          e.preventDefault();
          this.isDragover = false;
          const file = e?.dataTransfer?.files?.[0];
          if (!file) return;
          if (this.previewUrl) URL.revokeObjectURL(this.previewUrl);
          this.file = file;
          this.selectedFileName = file.name;
          this.uploadFileName = '';
          this.previewUrl = URL.createObjectURL(file);
        },
        onPaste(e) {
          const items = e?.clipboardData?.items;
          if (!items?.length) return;
          let file = null;
          for (let i = 0; i < items.length; i++) {
            const item = items[i];
            if (item.kind === 'file' && item.type?.startsWith('image/')) {
              file = item.getAsFile();
              break;
            }
          }
          if (!file) return;
          if (this.previewUrl) URL.revokeObjectURL(this.previewUrl);
          this.file = file;
          this.selectedFileName = file.name || 'pasted-image';
          this.uploadFileName = '';
          this.previewUrl = URL.createObjectURL(file);
        },
        async handleUpload() {
          if (!this.file || this.uploading) return;
          this.uploading = true;
          this.resultMessage = '';
          this.resultError = false;
          this.resultUrl = '';
          this.resultPayload = null;

          const fd = new FormData();
          const saveAsName = this.getUploadFilename();
          fd.append('file', this.file, saveAsName);
          if (saveAsName !== this.file.name) fd.append('filename', saveAsName);
          try {
            const res = await fetch(`${this.apiBase}/upload`, { method: 'POST', body: fd });
            const raw = await res.json();
            const { payload, errorMessage } = unwrapApiResponse(raw);
            if (res.ok) {
              this.resultError = false;
              this.resultPayload = payload || {};
              this.resultUrl = this.pickUrl(this.resultPayload);
              this.resultMessage = this.resultUrl ? '' : 'Upload OK but no URL returned';
              if (this.resultUrl) this.copySnippet(this.selectedFormat);
              await this.loadImages();
            } else {
              this.resultError = true;
              this.resultMessage = errorMessage || 'Upload failed';
            }
          } catch (err) {
            this.resultError = true;
            this.resultMessage = 'Request failed: ' + err.message;
          } finally {
            this.uploading = false;
          }
        },
        async loadServerInfo() {
          try {
            const res = await fetch(`${this.apiBase}/info`);
            if (!res.ok) return;
            const raw = await res.json();
            const { payload } = unwrapApiResponse(raw);
            this.storagePath = payload?.upload_dir || '';
            this.configPath = payload?.config_file || '';
            this.previewImageList = payload?.preview_image_list ?? false;
          } catch (_) {
            this.storagePath = '';
            this.configPath = '';
            this.previewImageList = false;
          }
        },
        async savePreviewSettings() {
          if (this.previewSaving) return;
          this.previewSaving = true;
          this.previewSaved = false;
          this.previewSaveError = '';
          try {
            const res = await fetch(`${this.apiBase}/settings/preview`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ preview_image_list: this.previewImageList }),
            });
            const raw = await res.json().catch(() => ({}));
            const { errorMessage } = unwrapApiResponse(raw);
            if (!res.ok) {
              this.previewSaveError = (errorMessage || this.t.saveFail) + (res.status ? ` (${res.status})` : '');
              return;
            }
            this.previewSaved = true;
            setTimeout(() => { this.previewSaved = false; }, 1500);
          } catch (e) {
            this.previewSaveError = this.t.saveFail + ': ' + e.message;
          } finally {
            this.previewSaving = false;
          }
        },
        async saveAllSettings() {
          if (this.settingsSaving) return;
          this.settingsSaving = true;
          this.settingsSaved = false;
          this.storageSaveError = '';
          this.previewSaveError = '';

          try {
            // 1) 保存存储设置
            {
              const res = await fetch(`${this.apiBase}/settings/storage`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.storageConfig),
              });
              const raw = await res.json().catch(() => ({}));
              const { payload, errorMessage } = unwrapApiResponse(raw);
              if (!res.ok) {
                this.storageSaveError = (errorMessage || this.t.saveFail) + (res.status ? ` (${res.status})` : '');
                return;
              }
              if (payload) this.storageConfig = payload;
            }

            // 2) 保存图片列表预览开关
            {
              const res = await fetch(`${this.apiBase}/settings/preview`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ preview_image_list: this.previewImageList }),
              });
              const raw = await res.json().catch(() => ({}));
              const { errorMessage } = unwrapApiResponse(raw);
              if (!res.ok) {
                this.previewSaveError = (errorMessage || this.t.saveFail) + (res.status ? ` (${res.status})` : '');
                return;
              }
            }

            this.settingsSaved = true;
            setTimeout(() => { this.settingsSaved = false; }, 1500);

            await this.loadServerInfo();
            await this.loadImages();
          } catch (e) {
            this.storageSaveError = this.t.saveFail + ': ' + e.message;
          } finally {
            this.settingsSaving = false;
          }
        },
        async loadStorageConfig() {
          try {
            const res = await fetch(`${this.apiBase}/settings/storage`);
            if (!res.ok) return;
            const raw = await res.json();
            const { payload } = unwrapApiResponse(raw);
            if (payload && typeof payload === 'object') {
              this.storageConfig = {
                type: payload.type || 'local',
                local: { base_dir: payload?.local?.base_dir || '' },
                github: {
                  owner: payload?.github?.owner || '',
                  repo: payload?.github?.repo || '',
                  branch: payload?.github?.branch || 'main',
                  path_prefix: payload?.github?.path_prefix || '',
                  token_env: payload?.github?.token_env || 'GITHUB_TOKEN',
                  token: payload?.github?.token || '',
                },
                gitlab: {
                  base_url: payload?.gitlab?.base_url || 'https://gitlab.com',
                  project: payload?.gitlab?.project || '',
                  branch: payload?.gitlab?.branch || 'main',
                  path_prefix: payload?.gitlab?.path_prefix || '',
                  token_env: payload?.gitlab?.token_env || 'GITLAB_TOKEN',
                  token: payload?.gitlab?.token || '',
                },
              };
            }
          } catch (_) {}
        },
        async saveStorageConfig() {
          if (this.storageSaving) return;
          this.storageSaving = true;
          this.storageSaved = false;
          this.storageSaveError = '';
          try {
            const res = await fetch(`${this.apiBase}/settings/storage`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.storageConfig),
            });
            const raw = await res.json().catch(() => ({}));
            const { payload, errorMessage } = unwrapApiResponse(raw);
            if (!res.ok) {
              this.storageSaveError = (errorMessage || this.t.saveFail) + (res.status ? ` (${res.status})` : '');
              return;
            }
            // refresh from server response to keep shape stable
            if (payload) {
              this.storageConfig = payload;
            }
            this.storageSaved = true;
            setTimeout(() => { this.storageSaved = false; }, 1500);
            await this.loadServerInfo();
            await this.loadImages();
          } catch (e) {
            this.storageSaveError = this.t.saveFail + ': ' + e.message;
          } finally {
            this.storageSaving = false;
          }
        },
        async loadImages() {
          this.imagesLoading = true;
          this.imagesError = '';
          const qs = this.dateFilter ? `?date=${encodeURIComponent(this.dateFilter)}` : '';
          try {
            const res = await fetch(`${this.apiBase}/images${qs}`);
            if (!res.ok) {
              this.imagesError = this.t.loadFail + ': ' + res.status;
              this.imageGroups = [];
              return;
            }
            const raw = await res.json();
            const { payload } = unwrapApiResponse(raw);
            this.imageGroups = Array.isArray(payload) ? payload : [];
          } catch (e) {
            this.imagesError = this.t.loadFail + ': ' + e.message;
            this.imageGroups = [];
          } finally {
            this.imagesLoading = false;
          }
        },
        formatSize(size) {
          if (size >= 1024 * 1024 * 1024) return (size / (1024 ** 3)).toFixed(2) + ' GB';
          if (size >= 1024 * 1024) return (size / (1024 ** 2)).toFixed(2) + ' MB';
          if (size >= 1024) return (size / 1024).toFixed(2) + ' KB';
          return size + ' B';
        },
        openImage(url) {
          if (url) window.open(url, '_blank');
        },
        setLang(l) {
          this.lang = l;
          localStorage.setItem('upload-lang', l);
        },
        saveFormatPreference() {
          localStorage.setItem('upload-format', this.selectedFormat);
        },
        pickUrl(obj) {
          const direct = obj?.direct_url || '';
          const proxy = obj?.url || '';
          return direct || proxy || '';
        },
        async copyToClipboard(text) {
          if (!text || typeof text !== 'string') return false;
          try {
            if (navigator.clipboard?.writeText) {
              await navigator.clipboard.writeText(text);
              return true;
            }
          } catch (_) {}
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          let ok = false;
          try {
            ok = document.execCommand('copy');
          } catch (_) {}
          document.body.removeChild(ta);
          return ok;
        },
        async copySnippet(kind) {
          if (!this.resultUrl) return;
          let text = kind === 'md' ? this.markdownSnippet : kind === 'tw' ? this.wikitextSnippet : this.vanillaSnippet;
          if (!text) return;
          const ok = await this.copyToClipboard(text);
          if (ok) {
            this.resultCopied = kind;
            setTimeout(() => { this.resultCopied = ''; }, 1500);
          }
        },
        async copyPath(path, kind) {
          if (!path) return;
          const ok = await this.copyToClipboard(path);
          if (ok) {
            this.pathCopied = kind;
            setTimeout(() => { this.pathCopied = ''; }, 1500);
          }
        },
        async copyLink(img) {
          const url = this.pickUrl(img || {});
          if (!url) return;
          let text = this.selectedFormat === 'md' ? `![](${url})` : this.selectedFormat === 'tw' ? `[img[image|${url}]]` : url;
          const ok = await this.copyToClipboard(text);
          if (ok) {
            img._copied = true;
            setTimeout(() => { img._copied = false; }, 1500);
          }
        },
        async deleteImage(img) {
          if (!img?.path) return;
          if (!window.confirm(this.t.deleteConfirm + '\n' + img.path)) return;
          try {
            const res = await fetch(`${this.apiBase}/images?path=${encodeURIComponent(img.path)}`, { method: 'DELETE' });
            if (!res.ok) {
              let raw = {};
              try { raw = await res.json(); } catch (_) {}
              const { errorMessage } = unwrapApiResponse(raw);
              window.alert(this.t.deleteFail + ': ' + (errorMessage || res.status));
              return;
            }
            await this.loadImages();
          } catch (e) {
            window.alert(this.t.deleteFail + ': ' + e.message);
          }
        },
      },
      template: `
        <div class="mx-auto max-w-4xl px-3 py-4 sm:px-0 sm:py-6 text-sm space-y-6 sm:space-y-8">
          <section class="rounded-lg border border-gray-200 bg-white p-4 sm:p-5 shadow-sm">
            <div class="mb-3 flex flex-wrap items-center justify-between gap-2 pb-2 border-b border-gray-100">
              <h1 class="text-base font-semibold text-gray-900 inline-flex items-center gap-2">
                <span class="text-gray-700" v-html="iconSvg('image-up', 'h-5 w-5')"></span>
                <span>{{ t.uploadTitle }}</span>
              </h1>
              <div class="flex gap-1 text-xs">
                <button type="button" class="rounded px-2 py-1 transition-colors" :class="lang === 'en' ? 'bg-gray-200 font-medium' : 'text-gray-500 hover:text-gray-700'" @click="setLang('en')">EN</button>
                <button type="button" class="rounded px-2 py-1 transition-colors" :class="lang === 'zh' ? 'bg-gray-200 font-medium' : 'text-gray-500 hover:text-gray-700'" @click="setLang('zh')">中文</button>
              </div>
            </div>

            <form @submit.prevent="handleUpload" @paste.stop.prevent="onPaste" class="space-y-4">
              <label
                class="flex min-h-[160px] cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed border-gray-300 px-3 py-6 text-center transition-all sm:min-h-[200px] hover:border-gray-400 hover:bg-gray-50/80 focus-within:ring-2 focus-within:ring-gray-400/50"
                :class="{ 'border-gray-500 bg-gray-100/80': isDragover }"
                @dragover.prevent="onDragOver"
                @dragleave.prevent="onDragLeave"
                @drop.prevent="onDrop"
                tabindex="0"
              >
                <input ref="fileInput" type="file" class="hidden" accept="image/jpeg,image/png,image/gif,image/webp" @change="onFileChange" />
                <span v-if="!selectedFileName" class="text-gray-500 text-sm inline-flex items-center gap-2">
                  <span class="text-gray-500" v-html="iconSvg('mouse-pointer-click', 'h-4 w-4')"></span>
                  <span>{{ t.dropHint }}</span>
                </span>
                <div v-else class="mt-2 flex w-full max-w-full flex-col items-center gap-2">
                  <div class="flex flex-wrap items-center justify-center gap-x-2 text-xs">
                    <span class="truncate max-w-[200px] text-gray-600" :title="selectedFileName">{{ selectedFileName }}</span>
                    <span v-if="file?.size" class="text-gray-500">{{ t.size }}: {{ formatSize(file.size) }}</span>
                  </div>
                  <img v-if="previewUrl" :src="previewUrl" :alt="t.preview" class="max-h-20 w-auto max-w-full rounded border border-gray-200 object-contain sm:max-h-24" />
                  <div class="mt-2 flex w-full min-w-0 flex-col gap-1.5 sm:flex-row sm:items-center">
                    <label class="shrink-0 text-xs text-gray-500">{{ t.fileName }}</label>
                    <input v-model="uploadFileName" type="text" class="min-w-0 flex-1 rounded border border-gray-300 bg-white px-2 py-1.5 text-xs focus:border-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-400" :placeholder="selectedFileName || t.fileNamePlaceholder" />
                  </div>
                </div>
              </label>

              <div class="flex flex-wrap items-center justify-between gap-2">
                <p class="min-w-0 flex-1 text-xs text-gray-400">{{ t.pasteHint }}</p>
                <div class="flex shrink-0 flex-wrap items-center gap-2">
                  <button type="button" class="inline-flex items-center gap-1.5 rounded-md border border-gray-300 bg-white px-3 py-1.5 text-xs font-medium hover:bg-gray-50 transition-colors" @click="showImageList = !showImageList">
                    <span class="text-gray-700" v-html="iconSvg(showImageList ? 'panel-right-close' : 'panel-right-open', 'h-4 w-4')"></span>
                    {{ showImageList ? t.hideList : t.imageList }}
                  </button>
                  <button type="submit" class="inline-flex items-center gap-1.5 rounded-md bg-gray-900 px-3 py-1.5 text-xs font-medium text-white hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors" :disabled="!file || uploading">
                    <span class="text-white" v-html="iconSvg(uploading ? 'loader-circle' : 'upload', uploading ? 'h-4 w-4 animate-spin' : 'h-4 w-4')"></span>
                    {{ uploading ? t.uploading : t.upload }}
                  </button>
                </div>
              </div>
            </form>
          </section>

          <template v-if="!resultError && resultUrl">
            <div class="rounded-lg border border-gray-200 bg-white overflow-hidden">
              <div class="flex flex-wrap items-center justify-between gap-2 border-b border-gray-200 bg-gray-50/80 px-3 py-2">
                <img :src="resultUrl" :alt="t.preview" class="size-8 shrink-0 rounded border border-gray-200 object-cover" />
                <div class="flex items-center gap-2">
                  <select v-model="selectedFormat" @change="saveFormatPreference" class="rounded border border-gray-300 bg-white px-2.5 py-1.5 text-xs font-medium focus:ring-1 focus:ring-gray-400">
                    <option value="md">Markdown</option>
                    <option value="tw">Wikitext</option>
                    <option value="link">{{ t.link }}</option>
                  </select>
                  <button type="button" class="inline-flex items-center gap-1.5 rounded border border-gray-300 bg-white px-3 py-1.5 text-xs font-medium hover:bg-gray-50 transition-colors" @click="copySnippet(selectedFormat)">
                    <span class="text-gray-700" v-html="iconSvg(resultCopied ? 'check' : 'copy', 'h-4 w-4')"></span>
                    {{ resultCopied ? t.copied : t.copy }}
                  </button>
                </div>
              </div>
              <div class="p-3 overflow-x-auto">
                <pre class="m-0 rounded bg-gray-100 px-3 py-2 text-xs font-mono leading-relaxed whitespace-pre break-all select-text"><code>{{ displaySnippet }}</code></pre>
              </div>
            </div>
          </template>
          <div v-else-if="resultError || resultMessage" class="rounded-lg border px-4 py-3 text-sm" :class="resultError ? 'border-red-200 bg-red-50 text-red-800' : 'border-gray-200 bg-gray-50'">
            {{ resultMessage }}
          </div>

          <section v-show="showImageList" class="rounded-lg border border-gray-200 bg-white p-4 sm:p-5 shadow-sm">
            <h2 class="mb-3 border-b border-gray-100 pb-2 text-base font-semibold text-gray-900 inline-flex items-center gap-2">
              <span class="text-gray-700" v-html="iconSvg('images', 'h-5 w-5')"></span>
              <span>{{ t.imageList }}</span>
            </h2>
            <div class="mb-3 flex flex-wrap items-center justify-end gap-2">
              <div class="inline-flex items-center gap-1.5 rounded border border-gray-300 bg-white px-2.5 py-1.5">
                <span class="text-gray-500" v-html="iconSvg('calendar', 'h-4 w-4')"></span>
                <input v-model="dateFilter" type="date" class="bg-transparent text-xs focus:outline-none" @change="loadImages" />
              </div>
              <button type="button" class="inline-flex items-center gap-1.5 rounded border border-gray-300 bg-white px-2.5 py-1.5 text-xs hover:bg-gray-50" @click="loadImages">
                <span class="text-gray-700" v-html="iconSvg(imagesLoading ? 'loader-circle' : 'refresh-cw', imagesLoading ? 'h-4 w-4 animate-spin' : 'h-4 w-4')"></span>
                {{ t.refresh }}
              </button>
            </div>
            <div class="mb-3 rounded-lg border border-gray-200 bg-white p-3">
              <div class="mb-2 flex items-center justify-between gap-2">
                <div class="text-xs font-semibold text-gray-700 inline-flex items-center gap-2">
                  <span class="text-gray-600" v-html="iconSvg('database', 'h-4 w-4')"></span>
                  <span>{{ t.storageSettings }}</span>
                </div>
                <div class="flex items-center gap-2">
                  <button
                    type="button"
                    class="inline-flex items-center gap-1.5 rounded border border-gray-300 bg-white px-2.5 py-1 text-xs hover:bg-gray-50 disabled:opacity-50"
                    :disabled="settingsSaving"
                    @click="saveAllSettings"
                  >
                    <span class="text-gray-700" v-html="iconSvg(settingsSaved ? 'check' : (settingsSaving ? 'loader-circle' : 'save'), settingsSaving ? 'h-4 w-4 animate-spin' : 'h-4 w-4')"></span>
                    {{ settingsSaving ? t.saving : (settingsSaved ? t.saved : t.save) }}
                  </button>
                </div>
              </div>
              <div v-if="storageSaveError || previewSaveError" class="mb-2 text-xs text-red-600">
                <div v-if="storageSaveError">{{ storageSaveError }}</div>
                <div v-if="previewSaveError">{{ previewSaveError }}</div>
              </div>
              <div class="grid grid-cols-1 gap-2 sm:grid-cols-2">
                <div class="flex flex-col gap-1 text-[11px] text-gray-500">
                  <span>{{ t.storageType }}</span>
                  <div class="flex flex-wrap gap-1.5">
                    <button type="button"
                      class="inline-flex items-center gap-1.5 rounded border px-2.5 py-1.5 text-xs transition-colors"
                      :class="storageConfig.type === 'local' ? 'border-gray-400 bg-gray-100 text-gray-900' : 'border-gray-300 bg-white text-gray-600 hover:bg-gray-50'"
                      @click="storageConfig.type = 'local'"
                    >
                      <span class="text-gray-700" v-html="iconSvg('folder')"></span>
                      <span>local</span>
                    </button>
                    <button type="button"
                      class="inline-flex items-center gap-1.5 rounded border px-2.5 py-1.5 text-xs transition-colors"
                      :class="storageConfig.type === 'github' ? 'border-gray-400 bg-gray-100 text-gray-900' : 'border-gray-300 bg-white text-gray-600 hover:bg-gray-50'"
                      @click="storageConfig.type = 'github'"
                    >
                      <span class="text-gray-700">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-4 w-4" fill="currentColor">
                          <path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.52 2.87 8.35 6.84 9.71.5.1.68-.22.68-.48 0-.24-.01-.87-.01-1.71-2.78.62-3.37-1.36-3.37-1.36-.45-1.17-1.11-1.48-1.11-1.48-.91-.64.07-.63.07-.63 1 .07 1.53 1.05 1.53 1.05.9 1.57 2.36 1.12 2.94.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.27 2.75 1.05.8-.23 1.65-.35 2.5-.35.85 0 1.7.12 2.5.35 1.9-1.32 2.74-1.05 2.74-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .26.18.59.69.48A10.02 10.02 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z" />
                        </svg>
                      </span>
                      <span>github</span>
                    </button>
                    <button type="button"
                      class="inline-flex items-center gap-1.5 rounded border px-2.5 py-1.5 text-xs transition-colors"
                      :class="storageConfig.type === 'gitlab' ? 'border-gray-400 bg-gray-100 text-gray-900' : 'border-gray-300 bg-white text-gray-600 hover:bg-gray-50'"
                      @click="storageConfig.type = 'gitlab'"
                    >
                      <span class="text-gray-700">
                        <svg
                          role="img"
                          viewBox="0 0 24 24"
                          xmlns="http://www.w3.org/2000/svg"
                          class="h-4 w-4"
                          fill="currentColor"
                        >
                          <title>GitLab</title>
                          <path d="m23.6004 9.5927-.0337-.0862L20.3.9814a.851.851 0 0 0-.3362-.405.8748.8748 0 0 0-.9997.0539.8748.8748 0 0 0-.29.4399l-2.2055 6.748H7.5375l-2.2057-6.748a.8573.8573 0 0 0-.29-.4412.8748.8748 0 0 0-.9997-.0537.8585.8585 0 0 0-.3362.4049L.4332 9.5015l-.0325.0862a6.0657 6.0657 0 0 0 2.0119 7.0105l.0113.0087.03.0213 4.976 3.7264 2.462 1.8633 1.4995 1.1321a1.0085 1.0085 0 0 0 1.2197 0l1.4995-1.1321 2.4619-1.8633 5.006-3.7489.0125-.01a6.0682 6.0682 0 0 0 2.0094-7.003z" />
                        </svg>
                      </span>
                      <span>gitlab</span>
                    </button>
                  </div>
                </div>

                <label v-if="storageConfig.type === 'local'" class="flex flex-col gap-1 text-[11px] text-gray-500">
                  <span>{{ t.localBaseDir }}</span>
                  <input v-model="storageConfig.local.base_dir" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" placeholder="./uploads" />
                </label>

                <template v-if="storageConfig.type === 'github'">
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500">
                    <span>{{ t.githubOwner }}</span>
                    <input v-model="storageConfig.github.owner" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500">
                    <span>{{ t.githubRepo }}</span>
                    <input v-model="storageConfig.github.repo" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500">
                    <span>{{ t.githubBranch }}</span>
                    <input v-model="storageConfig.github.branch" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" placeholder="main" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500">
                    <span>{{ t.githubPathPrefix }}</span>
                    <input v-model="storageConfig.github.path_prefix" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" placeholder="images" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500 sm:col-span-2">
                    <span>{{ t.githubTokenEnv }}</span>
                    <input v-model="storageConfig.github.token_env" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" placeholder="GITHUB_TOKEN" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500 sm:col-span-2">
                    <span>{{ t.githubToken }}</span>
                    <input v-model="storageConfig.github.token" type="password" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" autocomplete="off" />
                  </label>
                </template>

                <template v-if="storageConfig.type === 'gitlab'">
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500">
                    <span>{{ t.gitlabBaseUrl }}</span>
                    <input v-model="storageConfig.gitlab.base_url" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" placeholder="https://gitlab.com" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500">
                    <span>{{ t.gitlabProject }}</span>
                    <input v-model="storageConfig.gitlab.project" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" placeholder="group/project" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500">
                    <span>{{ t.gitlabBranch }}</span>
                    <input v-model="storageConfig.gitlab.branch" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" placeholder="main" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500">
                    <span>{{ t.gitlabPathPrefix }}</span>
                    <input v-model="storageConfig.gitlab.path_prefix" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" placeholder="images" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500 sm:col-span-2">
                    <span>{{ t.gitlabTokenEnv }}</span>
                    <input v-model="storageConfig.gitlab.token_env" type="text" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" placeholder="GITLAB_TOKEN" />
                  </label>
                  <label class="flex flex-col gap-1 text-[11px] text-gray-500 sm:col-span-2">
                    <span>{{ t.gitlabToken }}</span>
                    <input v-model="storageConfig.gitlab.token" type="password" class="rounded border border-gray-300 bg-white px-2 py-1.5 text-xs" autocomplete="off" />
                  </label>
                </template>
              </div>
              <div class="mt-2 flex flex-col gap-1 text-[11px] text-gray-500">
                <div>token 可直接写入配置文件（也可用 token_env 读取环境变量）。</div>
                <label class="inline-flex items-center gap-2">
                  <input type="checkbox" v-model="previewImageList" class="h-3.5 w-3.5 rounded border-gray-300 text-gray-900 focus:ring-gray-400" />
                  <span>图片列表中显示缩略图预览</span>
                </label>
              </div>
            </div>
            <div v-if="storagePath || configPath" class="mb-3 flex flex-col gap-1.5 text-[11px]">
              <div v-if="storagePath" class="flex items-center gap-2 rounded bg-gray-100/60 px-2.5 py-1.5">
                <span class="w-10 shrink-0 text-gray-500">{{ t.storage }}</span>
                <span :title="storagePath" class="min-w-0 flex-1 truncate font-mono text-gray-700">{{ storagePath }}</span>
                <button type="button" class="inline-flex items-center gap-1 shrink-0 rounded px-2 py-0.5 text-gray-500 hover:bg-gray-200" @click="copyPath(storagePath, 'storage')">
                  <span class="text-gray-600" v-html="iconSvg(pathCopied === 'storage' ? 'check' : 'copy', 'h-3.5 w-3.5')"></span>
                  <span>{{ pathCopied === 'storage' ? t.copied : t.copy }}</span>
                </button>
              </div>
              <div v-if="configPath" class="flex items-center gap-2 rounded bg-gray-100/60 px-2.5 py-1.5">
                <span class="w-10 shrink-0 text-gray-500">{{ t.config }}</span>
                <span :title="configPath" class="min-w-0 flex-1 truncate font-mono text-gray-700">{{ configPath }}</span>
                <button type="button" class="inline-flex items-center gap-1 shrink-0 rounded px-2 py-0.5 text-gray-500 hover:bg-gray-200" @click="copyPath(configPath, 'config')">
                  <span class="text-gray-600" v-html="iconSvg(pathCopied === 'config' ? 'check' : 'copy', 'h-3.5 w-3.5')"></span>
                  <span>{{ pathCopied === 'config' ? t.copied : t.copy }}</span>
                </button>
              </div>
            </div>
            <div class="max-h-[360px] sm:max-h-[480px] overflow-auto rounded-lg border border-gray-200 bg-gray-50/50">
              <div v-if="imagesError" class="p-4 text-sm text-red-600">{{ imagesError }}</div>
              <div v-else-if="!imageGroups.length" class="flex flex-col items-center justify-center gap-2 py-12 px-4 text-center border-2 border-dashed border-gray-200 rounded-lg">
                <p class="text-sm font-medium text-gray-600 inline-flex items-center gap-2">
                  <span class="text-gray-500" v-html="iconSvg('inbox', 'h-5 w-5')"></span>
                  <span>{{ t.noImages }}</span>
                </p>
                <p class="text-xs text-gray-500">{{ t.noImagesHint }}</p>
              </div>
              <template v-else>
                <div v-for="group in imageGroups" :key="group.date" class="p-2">
                  <div class="mb-2 mt-1 px-1 text-xs font-medium uppercase tracking-wide text-gray-500">{{ group.date }}</div>
                  <div v-for="(img, index) in group.files" :key="img.path" class="group flex flex-wrap items-center gap-2 rounded-md px-2 py-2 hover:bg-white border border-transparent hover:border-gray-200 transition-colors">
                    <div class="relative flex h-9 w-9 shrink-0 items-center justify-center overflow-hidden rounded border border-gray-200 bg-gray-100 text-xs text-gray-400 sm:h-11 sm:w-11">
                      <img v-if="previewImageList && pickUrl(img)" :src="pickUrl(img)" alt="" class="relative z-[1] h-full w-full object-cover" @error="$event.target.style.display='none'" />
                      <span class="absolute inset-0 z-0 flex items-center justify-center">{{ index + 1 }}</span>
                    </div>
                    <div class="min-w-0 flex-1 basis-0">
                      <div class="truncate text-xs text-gray-800 sm:text-[13px]" :title="img.path">
                        <span class="mr-1 text-gray-400">#{{ index + 1 }}</span>
                        <span class="truncate">{{ img.path }}</span>
                      </div>
                      <div class="mt-0.5 text-[10px] text-gray-500 sm:text-[11px]">{{ t.size }}: {{ formatSize(img.size) }}</div>
                    </div>
                    <div class="flex shrink-0 flex-wrap gap-1">
                      <button type="button" class="inline-flex items-center gap-1 rounded border border-gray-300 bg-white px-2 py-1 text-[10px] sm:text-[11px] hover:bg-gray-50" @click="openImage(pickUrl(img))">
                        <span class="text-gray-700" v-html="iconSvg('external-link', 'h-3.5 w-3.5')"></span>
                        <span>{{ t.open }}</span>
                      </button>
                      <button type="button" class="inline-flex items-center gap-1 rounded border border-gray-300 bg-white px-2 py-1 text-[10px] sm:text-[11px] hover:bg-gray-50" @click="copyLink(img)">
                        <span class="text-gray-700" v-html="iconSvg(img._copied ? 'check' : 'copy', 'h-3.5 w-3.5')"></span>
                        <span>{{ img._copied ? t.copied : t.copyLink }}</span>
                      </button>
                      <button type="button" class="inline-flex items-center gap-1 rounded border border-red-200 px-2 py-1 text-[10px] sm:text-[11px] text-red-600 hover:bg-red-50" @click="deleteImage(img)">
                        <span class="text-red-600" v-html="iconSvg('trash-2', 'h-3.5 w-3.5')"></span>
                        <span>{{ t.delete }}</span>
                      </button>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </section>
        </div>
      `,
    }).mount('#app');
  </script>
</body>
</html>
