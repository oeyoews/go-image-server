name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Go fmt
        run: gofmt -w ./cmd ./internal ./scripts

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      # - name: Make build
      #   run: make build

      - name: Make build-all
        run: make build-all
