basePath: /api/v1
definitions:
  upload.APIError:
    properties:
      code:
        example: 400
        type: integer
      data: {}
      message:
        example: missing path
        type: string
    type: object
  upload.APIResponse:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      message:
        example: success
        type: string
    type: object
info:
  contact: {}
  description: 本地图片上传与管理服务的开发文档。
  title: Go Image Server API
  version: "1.0"
paths:
  /images:
    delete:
      description: 通过相对路径删除图片，path 形如 2026-03-14/xxx.png
      parameters:
      - description: 相对路径(YYYY-MM-DD/xxx.png)
        in: query
        name: path
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/upload.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/upload.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/upload.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/upload.APIError'
      summary: 删除图片
      tags:
      - images
    get:
      description: 按日期分组返回图片列表，可通过 date=YYYY-MM-DD 过滤
      parameters:
      - description: 日期(YYYY-MM-DD)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/upload.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/upload.APIError'
      summary: 图片列表
      tags:
      - images
  /info:
    get:
      description: 返回服务端存储目录与配置文件路径，供前端展示
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/upload.APIResponse'
      summary: 服务信息
      tags:
      - info
  /upload:
    post:
      consumes:
      - multipart/form-data
      description: 上传一张图片并返回访问地址
      parameters:
      - description: 图片文件
        in: formData
        name: file
        required: true
        type: file
      - description: 保存时的文件名（可选，上传前改名）
        in: formData
        name: filename
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/upload.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/upload.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/upload.APIError'
      summary: 上传图片
      tags:
      - images
swagger: "2.0"
